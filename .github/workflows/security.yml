name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit cargo-deny cargo-cyclonedx
      - run: cargo audit
      - run: cargo deny check
      - run: cargo cyclonedx
