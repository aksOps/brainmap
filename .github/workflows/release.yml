name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Check version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/brainmap-cli/Cargo.toml | head -1)"
          npm_version="$(node -p "require('./npm/brainmap/package.json').version")"
          test "${cargo_version}" = "${version}"
          test "${npm_version}" = "${version}"
      - name: Install release validation tools
        run: |
          cargo install --locked --version 0.22.2 cargo-audit
          cargo install --locked --version 0.20.2 cargo-deny
          cargo install --locked --version 0.5.9 cargo-cyclonedx
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --locked --workspace --all-targets --all-features
      - name: Audit
        run: cargo audit
      - name: Dependency policy
        run: cargo deny check
      - name: Package cargo crate
        run: cargo package --locked -p brainmap-cli
      - name: Build optimized release binaries
        run: cargo build --release --locked --bin brainmap --bin brainmapd
      - name: Generate release SBOM
        run: |
          scripts/generate-sbom.sh
          git diff --exit-code -- crates/brainmap-cli/brainmap.json
      - name: Run optimized release qualification
        env:
          BRAINMAP_QUALIFICATION_OUT: dist/qualification
        run: scripts/release-qualification.sh
      - name: Prepare and test npm package
        run: |
          scripts/prepare-npm-package.sh
          npm test --prefix npm/brainmap
          npm pack --dry-run ./npm/brainmap
      - name: Package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="brainmap-${version}-linux-x86_64"
          mkdir -p "dist/${package}"
          cp target/release/brainmap "dist/${package}/"
          cp target/release/brainmapd "dist/${package}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${package}/"
          cp crates/brainmap-cli/brainmap.json "dist/${package}/brainmap.cdx.json"
          cp crates/brainmap-cli/brainmap.json "dist/${package}-sbom.cdx.json"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          tar -C dist -czf "dist/${package}-qualification.tar.gz" qualification
          cd dist
          sha256sum "${package}.tar.gz" "${package}-qualification.tar.gz" \
            "${package}-sbom.cdx.json" > SHA256SUMS
          sha256sum -c SHA256SUMS
          smoke="$(mktemp -d)"
          tar -xzf "${package}.tar.gz" -C "${smoke}"
          "${smoke}/${package}/brainmap" --help >/dev/null
          "${smoke}/${package}/brainmapd" --help >/dev/null
          rm -rf "${smoke}"
      - name: Assert release candidate source tree is clean
        run: test -z "$(git status --porcelain --untracked-files=all)"
      - name: Publish cargo crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping cargo publish"
            exit 0
          fi
          cargo publish --locked -p brainmap-cli
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish"
            exit 0
          fi
          npm publish ./npm/brainmap --access public --provenance
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.json dist/SHA256SUMS \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Linux x86_64 local Brainmap release."
