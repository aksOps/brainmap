name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Check version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_crates=(
            crates/brainmap-model-potion-base-8m-part-1
            crates/brainmap-model-potion-base-8m-part-2
            crates/brainmap-model-potion-base-8m-part-3
            crates/brainmap-model-potion-base-8m-part-4
            crates/brainmap-cli
          )
          for crate in "${cargo_crates[@]}"; do
            cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' "${crate}/Cargo.toml" | head -1)"
            test "${cargo_version}" = "${version}"
          done
          npm_version="$(node -p "require('./npm/brainmap/package.json').version")"
          test "${npm_version}" = "${version}"
      - run: cargo test --locked
      - name: Package cargo crates
        run: |
          set -euo pipefail
          cargo package --locked -p brainmap-model-potion-base-8m-part-1
          cargo package --locked -p brainmap-model-potion-base-8m-part-2
          cargo package --locked -p brainmap-model-potion-base-8m-part-3
          cargo package --locked -p brainmap-model-potion-base-8m-part-4
          cargo package --list -p brainmap-cli
      - name: Publish cargo crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping cargo publish"
            exit 0
          fi
          cargo publish --locked -p brainmap-model-potion-base-8m-part-1
          cargo publish --locked -p brainmap-model-potion-base-8m-part-2
          cargo publish --locked -p brainmap-model-potion-base-8m-part-3
          cargo publish --locked -p brainmap-model-potion-base-8m-part-4
          for attempt in 1 2 3 4 5; do
            cargo publish --locked -p brainmap-cli && exit 0
            sleep 30
          done
          cargo publish --locked -p brainmap-cli
      - run: cargo build --release --locked --bin brainmap --bin brainmapd
      - name: Package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="brainmap-${version}-linux-x86_64"
          mkdir -p "dist/${package}"
          cp target/release/brainmap "dist/${package}/"
          cp target/release/brainmapd "dist/${package}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          cd dist
          sha256sum "${package}.tar.gz" > SHA256SUMS
      - name: Prepare npm package
        run: |
          scripts/prepare-npm-package.sh
          npm test --prefix npm/brainmap
          npm pack --dry-run ./npm/brainmap
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish"
            exit 0
          fi
          npm publish ./npm/brainmap --access public --provenance
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Linux x86_64 local Brainmap release."
