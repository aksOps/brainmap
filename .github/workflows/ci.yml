name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - run: cargo install --locked --version 0.22.2 cargo-audit
      - run: cargo install --locked --version 0.20.2 cargo-deny
      - run: cargo install --locked --version 0.5.9 cargo-cyclonedx
      - run: scripts/test-vendored-i18n.sh
      - run: cargo audit
      - run: cargo deny check
      - run: scripts/generate-sbom.sh
      - run: git diff --exit-code -- crates/brainmap-cli/brainmap.json
